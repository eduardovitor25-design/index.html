<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Caixa</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
    padding:15px;
}

h1{
    font-size:20px;
    margin-bottom:15px;
}

.meta{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
}

.box{
    background:#1e293b;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
}

input{
    width:95%;
    padding:8px;
    font-size:16px;
    text-align:center;
    border:none;
    border-radius:8px;
    margin-top:5px;
}

.total{
    background:#334155;
    padding:12px;
    border-radius:12px;
    margin-top:12px;
    font-weight:bold;
}

.status-ok{
    background:#16a34a;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.status-erro{
    background:#dc2626;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

button{
    margin-top:12px;
    padding:8px 15px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Relatório de Venda</h1>

<div class="meta">
    <strong>Total esperado (Meta)</strong>
    <input type="number" id="meta" oninput="calcular()">
</div>

<div class="box">Cartão
<input type="number" id="c" oninput="calcular()"></div>

<div class="box">PIX
<input type="number" id="p" oninput="calcular()"></div>

<div class="box">Dinheiro
<input type="number" id="d" oninput="calcular()"></div>

<div class="box">Depósito
<input type="number" id="dep" oninput="calcular()"></div>

<div class="box">Pix Chave
<input type="number" id="pc" oninput="calcular()"></div>

<div class="box">Faturar
<input type="number" id="f" oninput="calcular()"></div>

<div class="total">
Total Atual: R$ <span id="total">0.00</span>
</div>

<div id="status"></div>

<button onclick="limpar()">Limpar</button>

</div>

<script>
function calcular(){
let meta=parseFloat(document.getElementById("meta").value)||0;
let c=parseFloat(document.getElementById("c").value)||0;
let p=parseFloat(document.getElementById("p").value)||0;
let d=parseFloat(document.getElementById("d").value)||0;
let dep=parseFloat(document.getElementById("dep").value)||0;
let pc=parseFloat(document.getElementById("pc").value)||0;
let f=parseFloat(document.getElementById("f").value)||0;

let total=c+p+d+dep+pc+f;

document.getElementById("total").innerText=total.toFixed(2);

let statusDiv=document.getElementById("status");

if(meta===0){
    statusDiv.innerHTML="";
    return;
}

if(total===meta){
    statusDiv.innerHTML="<div class='status-ok'>✅ Tudo certo 👍 Aura + Ego</div>";
}else{
    let diferenca=(meta-total).toFixed(2);
    statusDiv.innerHTML="<div class='status-erro'>❌ Falta R$ "+diferenca+" 👎 olha direito aí</div>";
}
}

function limpar(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("total").innerText="0.00";
document.getElementById("status").innerHTML="";
}
</script>

</body>
</html>
