<script>
function calcular(){
let meta=parseFloat(document.getElementById("meta").value)||0;
let c=parseFloat(document.getElementById("c").value)||0;
let p=parseFloat(document.getElementById("p").value)||0;
let d=parseFloat(document.getElementById("d").value)||0;
let dep=parseFloat(document.getElementById("dep").value)||0;
let pc=parseFloat(document.getElementById("pc").value)||0;
let f=parseFloat(document.getElementById("f").value)||0;

let total=c+p+d+dep+pc+f;

document.getElementById("total").innerText=total.toFixed(2);

let statusDiv=document.getElementById("status");

if(meta===0){
statusDiv.innerHTML="";
return;
}

if(total===meta){
statusDiv.innerHTML="<div class='status-ok'>✅ Tudo certo 👍 Aura + Ego</div>";
}
else if(total<meta){
let diferenca=(meta-total).toFixed(2);
statusDiv.innerHTML="<div class='status-erro'>❌ Falta R$ "+diferenca+" 👎 olha direito aí</div>";
}
else{
let diferenca=(total-meta).toFixed(2);
statusDiv.innerHTML="<div class='status-erro'>😒 Tá sobrando R$ "+diferenca+" — tem coisa errada aí irmão</div>";
}
}

function limpar(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("total").innerText="0.00";
document.getElementById("status").innerHTML="";
}
</script>
