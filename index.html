<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fechamento de Caixa</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

.versao{
    position:fixed;
    top:5px;
    right:8px;
    font-size:10px;
    color:#64748b;
}

.container{
    max-width:420px;
    margin:auto;
    padding:15px;
}

.titulo{
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
}

.meta-box{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.box{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    font-size:14px;
}

input{
    width:100%;
    padding:6px;
    margin-top:5px;
    font-size:15px;
    text-align:center;
    border:none;
    border-radius:6px;
}

.total{
    background:#334155;
    padding:12px;
    border-radius:12px;
    margin-top:15px;
    font-weight:bold;
}

.status-ok{
    background:#16a34a;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.status-erro{
    background:#dc2626;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.status-aviso{
    background:#f59e0b;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

button{
    margin-top:12px;
    padding:8px 15px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
}

.credito{
    margin-top:15px;
    font-size:11px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="versao">v1.0</div>

<div class="container">

<div class="titulo">💼 Fechamento de Caixa</div>

<div class="meta-box">
<input type="text" id="meta" placeholder="Total Relatório" oninput="calcular()" inputmode="decimal">
</div>

<div class="grid">
<div class="box">Cartão
<input type="text" id="c" oninput="calcular()" inputmode="decimal"></div>

<div class="box">PIX
<input type="text" id="p" oninput="calcular()" inputmode="decimal"></div>

<div class="box">Dinheiro
<input type="text" id="d" oninput="calcular()" inputmode="decimal"></div>

<div class="box">Depósito
<input type="text" id="dep" oninput="calcular()" inputmode="decimal"></div>

<div class="box">Pix Chave
<input type="text" id="pc" oninput="calcular()" inputmode="decimal"></div>

<div class="box">Faturar
<input type="text" id="f" oninput="calcular()" inputmode="decimal"></div>
</div>

<div class="total">
Soma Caixa: R$ <span id="total">0,00</span>
</div>

<div id="status"></div>

<button onclick="limpar()">Limpar</button>

<div class="credito">
Programado e criado por Eduardo Teixeira
</div>

</div>

<script>

// Máscara e conversão brasileira
function converter(valor){
    if(!valor) return 0;
    valor = valor.replace(/\./g,'').replace(',','.');
    return parseFloat(valor) || 0;
}

// Formatar para padrão BR
function formatarBR(valor){
    return valor.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});
}

// Salvar dados automaticamente
function salvar(){
    document.querySelectorAll("input").forEach(input=>{
        localStorage.setItem(input.id,input.value);
    });
}

// Restaurar dados ao abrir
window.onload=function(){
    document.querySelectorAll("input").forEach(input=>{
        input.value=localStorage.getItem(input.id) || "";
    });
    calcular();
}

function calcular(){

salvar();

let meta=converter(document.getElementById("meta").value);
let c=converter(document.getElementById("c").value);
let p=converter(document.getElementById("p").value);
let d=converter(document.getElementById("d").value);
let dep=converter(document.getElementById("dep").value);
let pc=converter(document.getElementById("pc").value);
let f=converter(document.getElementById("f").value);

let total=c+p+d+dep+pc+f;

document.getElementById("total").innerText=formatarBR(total);

let statusDiv=document.getElementById("status");

if(!meta){
statusDiv.innerHTML="<div class='status-aviso'>⚠️ Defina o Total Relatório primeiro</div>";
return;
}

// Comparação com tolerância (evita erro por centavos invisíveis)
if(Math.abs(total - meta) < 0.01){
statusDiv.innerHTML="<div class='status-ok'>✅ Tudo certo 👍 Aura + Ego</div>";
}
else if(total<meta){
let diferenca=formatarBR(meta-total);
statusDiv.innerHTML="<div class='status-erro'>❌ Falta R$ "+diferenca+" 👎 olha direito aí</div>";
}
else{
let diferenca=formatarBR(total-meta);
statusDiv.innerHTML="<div class='status-erro'>😒 Tá sobrando R$ "+diferenca+" — tem coisa errada aí irmão</div>";
}
}

function limpar(){
document.querySelectorAll("input").forEach(i=>{
    i.value="";
    localStorage.removeItem(i.id);
});
document.getElementById("total").innerText="0,00";
document.getElementById("status").innerHTML="";
}
</script>

</body>
</html>
