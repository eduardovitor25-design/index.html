<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fechamento de Caixa</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
    padding:15px;
}

.titulo{
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
    margin-bottom:5px;
}

.subtitulo{
    font-size:16px;
    margin-bottom:10px;
}

.meta-box{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.box{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    font-size:14px;
}

input{
    width:100%;
    padding:6px;
    margin-top:5px;
    font-size:15px;
    text-align:center;
    border:none;
    border-radius:6px;
}

.total{
    background:#334155;
    padding:12px;
    border-radius:12px;
    margin-top:15px;
    font-weight:bold;
}

.status-ok{
    background:#16a34a;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.status-erro{
    background:#dc2626;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

button{
    margin-top:12px;
    padding:8px 15px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
}

.credito{
    margin-top:15px;
    font-size:11px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<div class="titulo">💼 Fechamento de Caixa</div>
<div class="subtitulo">Total Relatório</div>

<div class="meta-box">
<input type="text" id="meta" placeholder="Digite o valor total esperado" oninput="calcular()">
</div>

<div class="grid">
<div class="box">Cartão
<input type="text" id="c" oninput="calcular()"></div>

<div class="box">PIX
<input type="text" id="p" oninput="calcular()"></div>

<div class="box">Dinheiro
<input type="text" id="d" oninput="calcular()"></div>

<div class="box">Depósito
<input type="text" id="dep" oninput="calcular()"></div>

<div class="box">Pix Chave
<input type="text" id="pc" oninput="calcular()"></div>

<div class="box">Faturar
<input type="text" id="f" oninput="calcular()"></div>
</div>

<div class="total">
Soma Caixa: R$ <span id="total">0,00</span>
</div>

<div id="status"></div>

<button onclick="limpar()">Limpar</button>

<div class="credito">
Programado e criado por Eduardo Teixeira
</div>

</div>

<script>
function converter(valor){
    if(!valor) return 0;
    valor = valor.replace(/\./g,'').replace(',','.');
    return parseFloat(valor) || 0;
}

function calcular(){
let meta=converter(document.getElementById("meta").value);
let c=converter(document.getElementById("c").value);
let p=converter(document.getElementById("p").value);
let d=converter(document.getElementById("d").value);
let dep=converter(document.getElementById("dep").value);
let pc=converter(document.getElementById("pc").value);
let f=converter(document.getElementById("f").value);

let total=c+p+d+dep+pc+f;

document.getElementById("total").innerText=
total.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});

let statusDiv=document.getElementById("status");

if(meta===0){
statusDiv.innerHTML="";
return;
}

if(total===meta){
statusDiv.innerHTML="<div class='status-ok'>✅ Tudo certo 👍 Aura + Ego</div>";
}
else if(total<meta){
let diferenca=(meta-total).toLocaleString('pt-BR',{minimumFractionDigits:2});
statusDiv.innerHTML="<div class='status-erro'>❌ Falta R$ "+diferenca+" 👎 olha direito aí</div>";
}
else{
let diferenca=(total-meta).toLocaleString('pt-BR',{minimumFractionDigits:2});
statusDiv.innerHTML="<div class='status-erro'>😒 Tá sobrando R$ "+diferenca+" — tem coisa errada aí irmão</div>";
}
}

function limpar(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("total").innerText="0,00";
document.getElementById("status").innerHTML="";
}
</script>

</body>
</html>
